<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>คอร์สของบุตรหลาน — โรงเรียนพรศิริกุล</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#5b3df2; --brand-2:#8a5cff; --brand-50:#f1edff;
  --ink:#171623; --soft:#6b7280; --mut:#9aa1b2; --line:#ececf4; --bg:#f7f7fb; --white:#fff;
  --green:#16a36a; --green-50:#e8f8f0; --gold:#e0a000; --gold-50:#fff6e0; --red:#e54848; --red-50:#fdeded;
  --blue:#3b6fe0; --blue-50:#eef4ff;
  --radius:18px;
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body{ margin:0; background:var(--bg); color:var(--ink); font-family:'Prompt','Sarabun',system-ui,sans-serif; line-height:1.5; -webkit-font-smoothing:antialiased; }
.hidden{ display:none !important; }
.i{ width:1.1em; height:1.1em; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; vertical-align:-.16em; flex:none; }

.head{ background:radial-gradient(120% 130% at 85% -20%, #9a6bff, #5b3df2 55%, #3d24c4); color:#fff; padding:22px 18px 20px; }
.head h1{ font-size:19px; margin:0; font-weight:700; }
.head p{ margin:4px 0 0; font-size:13px; opacity:.9; }
.wrap{ padding:16px 16px 100px; max-width:560px; margin:0 auto; }

.loading{ text-align:center; padding:64px 20px; color:var(--soft); }
.spin{ width:34px; height:34px; border:3px solid var(--brand-50); border-top-color:var(--brand); border-radius:50%; animation:sp .8s linear infinite; margin:0 auto 14px; }
@keyframes sp{ to{ transform:rotate(360deg); } }

.notice{ background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:28px 20px; text-align:center; color:var(--soft); }
.notice .ic{ width:54px; height:54px; border-radius:50%; background:var(--brand-50); color:var(--brand); display:grid; place-items:center; margin:0 auto 14px; }
.notice .ic .i{ width:26px; height:26px; }
.notice b{ color:var(--ink); display:block; margin-bottom:6px; font-size:16px; }
.notice .btn{ margin-top:16px; }

.kid{ background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:14px; box-shadow:0 4px 16px rgba(30,22,70,.05); }
.kid-top{ display:flex; align-items:center; gap:12px; margin-bottom:6px; }
.kid-av{ width:44px; height:44px; border-radius:13px; background:linear-gradient(135deg,var(--brand),var(--brand-2)); color:#fff; display:grid; place-items:center; font-weight:700; font-size:18px; flex:none; }
.kid-nm{ font-weight:700; font-size:16px; }
.kid-meta{ font-size:12.5px; color:var(--soft); }
.pay{ font-size:11.5px; font-weight:600; padding:3px 10px; border-radius:999px; margin-left:auto; }
.pay-ok{ background:var(--green-50); color:var(--green); }
.pay-wait{ background:var(--gold-50); color:var(--gold); }
.pay-no{ background:var(--red-50); color:var(--red); }

.course{ border:1px solid var(--line); border-radius:14px; padding:13px; margin-top:11px; }
.course-h{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
.course-nm{ font-weight:600; font-size:14.5px; }
.course-meta{ font-size:12px; color:var(--soft); margin-top:2px; display:flex; gap:10px; flex-wrap:wrap; }
.course-meta span{ display:inline-flex; align-items:center; gap:5px; }
.course-meta .i{ width:13px; height:13px; }
.btn-leave{ border:1.5px solid var(--line); background:#fff; color:var(--brand); border-radius:9px; padding:6px 12px; font-size:12.5px; font-weight:600; cursor:pointer; white-space:nowrap; font-family:inherit; display:inline-flex; align-items:center; gap:5px; }

.att-pills{ display:flex; gap:7px; margin:11px 0 4px; }
.pill{ flex:1; text-align:center; border-radius:10px; padding:7px 4px; }
.pill .n{ font-size:17px; font-weight:700; line-height:1; }
.pill .l{ font-size:11px; margin-top:2px; }
.pill.present{ background:var(--green-50); color:var(--green); }
.pill.late{ background:var(--gold-50); color:var(--gold); }
.pill.absent{ background:var(--red-50); color:var(--red); }
.pill.leave{ background:var(--blue-50); color:var(--blue); }

.result{ margin-top:11px; background:var(--brand-50); border-radius:11px; padding:11px 13px; }
.result .rh{ font-size:12px; color:var(--brand); font-weight:600; display:flex; align-items:center; gap:6px; margin-bottom:4px; }
.result .rv{ font-size:13.5px; }
.result .rv b{ font-size:18px; color:var(--brand); }

.recent{ margin-top:10px; }
.rec-toggle{ font-size:12.5px; color:var(--soft); cursor:pointer; display:inline-flex; align-items:center; gap:5px; user-select:none; }
.rec-list{ margin-top:8px; display:flex; flex-direction:column; gap:5px; }
.rec-item{ display:flex; justify-content:space-between; font-size:12.5px; padding:6px 10px; background:var(--bg); border-radius:8px; }
.rec-st{ font-weight:600; }
.rec-st.present{ color:var(--green); } .rec-st.late{ color:var(--gold); } .rec-st.absent{ color:var(--red); } .rec-st.leave{ color:var(--blue); }
.empty-att{ font-size:12.5px; color:var(--mut); margin-top:9px; text-align:center; padding:8px; }

/* sheet (leave form) */
.overlay{ position:fixed; inset:0; z-index:90; background:rgba(18,14,40,.5); backdrop-filter:blur(4px); display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity .25s; }
.overlay.show{ opacity:1; pointer-events:auto; }
.sheet{ background:#fff; width:100%; max-width:560px; border-radius:22px 22px 0 0; padding:20px 20px calc(20px + env(safe-area-inset-bottom)); transform:translateY(30px); transition:transform .25s; }
.overlay.show .sheet{ transform:translateY(0); }
.sheet h3{ margin:0 0 4px; font-size:17px; }
.sheet .sub{ color:var(--soft); font-size:13px; margin:0 0 16px; }
.field{ margin-bottom:14px; }
.field label{ display:block; font-size:13px; font-weight:600; margin-bottom:7px; }
.ctl{ width:100%; padding:12px 13px; border:1.5px solid var(--line); border-radius:11px; font-size:15px; font-family:inherit; }
.ctl:focus{ outline:0; border-color:var(--brand); box-shadow:0 0 0 4px var(--brand-50); }
.btn{ width:100%; padding:13px; border-radius:12px; font-weight:700; font-size:15px; border:0; cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; justify-content:center; gap:8px; }
.btn-primary{ background:var(--brand); color:#fff; }
.btn-ghost{ background:var(--bg); color:var(--soft); margin-top:8px; }

.toast{ position:fixed; left:50%; bottom:26px; translate:-50% 0; background:var(--ink); color:#fff; padding:11px 20px; border-radius:999px; font-size:13.5px; z-index:120; opacity:0; pointer-events:none; transition:opacity .25s; }
.toast.show{ opacity:1; }

/* bottom nav */
.bottomnav{ position:fixed; left:0; right:0; bottom:0; background:#fff; border-top:1px solid var(--line); z-index:60; padding-bottom:env(safe-area-inset-bottom); }
.bottomnav-in{ max-width:560px; margin:0 auto; display:flex; }
.nav-btn{ flex:1; background:none; border:0; padding:9px 4px 8px; display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--mut); font-family:inherit; cursor:pointer; }
.nav-btn .i{ width:21px; height:21px; }
.nav-btn span{ font-size:11px; font-weight:500; }
.nav-btn.on{ color:var(--brand); }

/* settings tab */
.set-card{ background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:18px; margin-bottom:14px; }
.set-row{ display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.set-av{ width:48px; height:48px; border-radius:14px; background:linear-gradient(135deg,var(--brand),var(--brand-2)); color:#fff; display:grid; place-items:center; font-weight:700; font-size:19px; flex:none; }
.set-nm{ font-weight:700; font-size:16px; }
.set-sub{ font-size:12.5px; color:var(--soft); }
.section-title{ font-size:12.5px; font-weight:700; color:var(--soft); margin:0 0 10px; }
.btn-danger{ background:var(--red-50); color:var(--red); }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="ic-calendar" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></symbol>
  <symbol id="ic-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></symbol>
  <symbol id="ic-award" viewBox="0 0 24 24"><circle cx="12" cy="9" r="6"/><path d="M8.2 13.9 7 22l5-3 5 3-1.2-8.1"/></symbol>
  <symbol id="ic-cal-x" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18M9 14l6 6M15 14l-6 6"/></symbol>
  <symbol id="ic-chev" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></symbol>
  <symbol id="ic-inbox" viewBox="0 0 24 24"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.5 5h13l3.5 7v6a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-6z"/></symbol>
  <symbol id="ic-book" viewBox="0 0 24 24"><path d="M4 5a2 2 0 0 1 2-2h13v16H6a2 2 0 0 0-2 2z"/><path d="M19 19v2H6.5A2.5 2.5 0 0 1 4 18.5"/></symbol>
  <symbol id="ic-home" viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V10"/><path d="M9 21v-6h6v6"/></symbol>
  <symbol id="ic-settings" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06A2 2 0 1 1 7.04 4.29l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09A1.65 1.65 0 0 0 15 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></symbol>
</svg>

<div class="head">
  <h1>คอร์สของบุตรหลาน</h1>
  <p id="headSub">การมาเรียน · ผลการเรียน · แจ้งลา</p>
</div>

<div class="wrap" id="app">
  <div class="loading"><div class="spin"></div>กำลังเชื่อมต่อ...</div>
</div>

<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>
<nav class="bottomnav hidden" id="bottomnav"></nav>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="config.js"></script>
<script>
let PROFILE = null, STATE = [];
const ST_TH = { present:'มา', late:'สาย', absent:'ขาด', leave:'ลา' };

function esc(v){ return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function initials(n){ return (n||'?').trim().charAt(0); }
function svg(id){ return '<svg class="i"><use href="#'+id+'"></use></svg>'; }
function today(){ const d=new Date(); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
function thaiDate(ymd){ if(!ymd) return ''; const p=String(ymd).split('-'); const m=['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.']; return parseInt(p[2],10)+' '+m[parseInt(p[1],10)]+' '+(parseInt(p[0],10)+543); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }
function render(h){ document.getElementById('app').innerHTML = h; }
async function api(action, data){
  const r = await fetch(GAS_API_URL, { method:'POST', body: JSON.stringify(Object.assign({action}, data||{})) });
  return r.json();
}

async function boot(){
  if(typeof GAS_API_URL==='undefined' || !GAS_API_URL || typeof LIFF_ID==='undefined' || !LIFF_ID){
    render('<div class="notice"><div class="ic">'+svg('ic-inbox')+'</div><b>ยังไม่ได้ตั้งค่า</b>กรุณาตั้ง GAS_API_URL และ LIFF_ID ใน config.js</div>'); return;
  }
  try{
    await liff.init({ liffId: LIFF_ID });
    if(!liff.isLoggedIn()){ liff.login(); return; }
    PROFILE = await liff.getProfile();
    load();
  }catch(e){ render('<div class="notice">เชื่อมต่อ LIFF ไม่สำเร็จ: '+esc(e.message||e)+'</div>'); }
}

async function load(){
  const res = await api('parentCourseInit', { line_user_id: PROFILE.userId });
  if(res.status==='empty'){
    render('<div class="notice"><div class="ic">'+svg('ic-inbox')+'</div><b>ยังไม่พบใบสมัครคอร์ส</b>'
      + 'เมื่อสมัครคอร์สผ่านบัญชี LINE นี้ ข้อมูลการมาเรียนและผลการเรียนจะแสดงที่นี่'
      + '<a class="btn btn-primary" style="text-decoration:none;margin-top:16px" href="enroll.html">สมัครคอร์สเรียน</a></div>');
    return;
  }
  if(res.status!=='success'){ render('<div class="notice">'+esc(res.message||'เกิดข้อผิดพลาด')+'</div>'); return; }
  STATE = res.data;
  document.getElementById('headSub').textContent = 'สวัสดีค่ะ คุณ'+(PROFILE.displayName||'');
  renderActiveTab();
  renderNav();
}

function emptyState(text){
  return '<div class="notice"><div class="ic">'+svg('ic-inbox')+'</div>'+esc(text)+'</div>';
}

/* ---------- bottom nav ---------- */
const NAV_ITEMS = [
  { id:'home', label:'หน้าหลัก', icon:'ic-home' },
  { id:'attendance', label:'การมาเรียน', icon:'ic-calendar' },
  { id:'results', label:'ผลการเรียน', icon:'ic-award' },
  { id:'settings', label:'ตั้งค่า', icon:'ic-settings' }
];
let TAB = 'home';
function renderNav(){
  let h = '<div class="bottomnav-in">';
  NAV_ITEMS.forEach(function(n){
    h += '<button class="nav-btn'+(TAB===n.id?' on':'')+'" onclick="setTab(\''+n.id+'\')">'+svg(n.icon)+'<span>'+n.label+'</span></button>';
  });
  h += '</div>';
  document.getElementById('bottomnav').innerHTML = h;
  document.getElementById('bottomnav').classList.remove('hidden');
}
function setTab(t){ TAB = t; renderActiveTab(); renderNav(); window.scrollTo(0,0); }
function renderActiveTab(){
  if(TAB==='attendance') renderAttendanceTab();
  else if(TAB==='results') renderResultsTab();
  else if(TAB==='settings') renderSettingsTab();
  else renderHome();
}

const PAY = { approved:['pay-ok','อนุมัติแล้ว'], pending_review:['pay-wait','รอตรวจสอบ'], rejected:['pay-no','ไม่อนุมัติ'] };
function renderHome(){
  let h = '';
  STATE.forEach(function(kid){
    const pay = PAY[kid.payment_status] || PAY.pending_review;
    h += '<div class="kid"><div class="kid-top">'
      + '<span class="kid-av">'+initials(kid.student_name)+'</span>'
      + '<div><div class="kid-nm">'+esc(kid.student_name)+'</div>'
      + '<div class="kid-meta">'+esc(kid.level||'-')+' · '+esc(kid.room||'-')+' · เลขที่ '+esc(kid.ref||'-')+'</div></div>'
      + '<span class="pay '+pay[0]+'">'+pay[1]+'</span></div>';

    if(!kid.courses.length){ h += '<div class="empty-att">ยังไม่มีคอร์ส</div>'; }
    kid.courses.forEach(function(c){
      const s = c.summary || {};
      const tm = (c.time_start||'') + (c.time_end?('–'+c.time_end):'');
      h += '<div class="course"><div class="course-h"><div>'
        + '<div class="course-nm">'+esc(c.name)+'</div>'
        + '<div class="course-meta">'
          + (c.days?'<span>'+svg('ic-calendar')+esc(c.days)+'</span>':'')
          + (tm?'<span>'+svg('ic-clock')+esc(tm)+' น.</span>':'')
        + '</div></div>'
        + '<button class="btn-leave" onclick="openLeave(\''+kid.enrollment_id+'\',\''+c.course_id+'\',\''+esc(c.name)+'\')">'+svg('ic-cal-x')+'แจ้งลา</button>'
        + '</div>';

      if(s.total){
        h += '<div class="att-pills">'
          + pill('present', s.present) + pill('late', s.late) + pill('absent', s.absent) + pill('leave', s.leave)
          + '</div>';
      } else {
        h += '<div class="empty-att">ยังไม่มีบันทึกการมาเรียน</div>';
      }
      h += '</div>';
    });
    h += '</div>';
  });
  if(!h){ h = emptyState('ยังไม่มีคอร์สที่ติดตามได้'); }
  render(h);
}
function pill(cls, n){ return '<div class="pill '+cls+'"><div class="n">'+(n||0)+'</div><div class="l">'+ST_TH[cls]+'</div></div>'; }

/* ---------- แท็บ: การมาเรียน ---------- */
function renderAttendanceTab(){
  let h = '';
  STATE.forEach(function(kid){
    kid.courses.forEach(function(c){
      const s = c.summary || {};
      h += '<div class="kid"><div class="kid-top">'
        + '<span class="kid-av">'+initials(kid.student_name)+'</span>'
        + '<div><div class="kid-nm">'+esc(kid.student_name)+'</div>'
        + '<div class="kid-meta">'+esc(c.name)+'</div></div></div>';
      if(s.total){
        h += '<div class="att-pills">'
          + pill('present', s.present) + pill('late', s.late) + pill('absent', s.absent) + pill('leave', s.leave)
          + '</div>';
        h += '<div class="rec-list" style="margin-top:10px">';
        (c.records||[]).forEach(function(r){
          h += '<div class="rec-item"><span>'+thaiDate(r.date)+(r.note?' · '+esc(r.note):'')+'</span>'
            + '<span class="rec-st '+r.status+'">'+esc(r.status_th)+'</span></div>';
        });
        h += '</div>';
      } else {
        h += '<div class="empty-att">ยังไม่มีบันทึกการมาเรียน</div>';
      }
      h += '</div>';
    });
  });
  if(!h){ h = emptyState('ยังไม่มีคอร์สที่ติดตามได้'); }
  render(h);
}

/* ---------- แท็บ: ผลการเรียน ---------- */
function renderResultsTab(){
  let h = '';
  STATE.forEach(function(kid){
    kid.courses.forEach(function(c){
      h += '<div class="kid"><div class="kid-top">'
        + '<span class="kid-av">'+initials(kid.student_name)+'</span>'
        + '<div><div class="kid-nm">'+esc(kid.student_name)+'</div>'
        + '<div class="kid-meta">'+esc(c.name)+'</div></div></div>';
      if(c.result){
        h += '<div class="result" style="margin-top:0"><div class="rh">'+svg('ic-award')+'ผลการเรียน</div><div class="rv">'
          + (c.result.score!=null && c.result.score!==''?'คะแนน <b>'+esc(c.result.score)+'</b> ':'')
          + (c.result.grade?' · เกรด <b>'+esc(c.result.grade)+'</b>':'')
          + (c.result.comment?'<div style="margin-top:4px;color:var(--soft)">'+esc(c.result.comment)+'</div>':'')
          + '</div></div>';
      } else {
        h += '<div class="empty-att">ยังไม่มีผลการเรียน</div>';
      }
      h += '</div>';
    });
  });
  if(!h){ h = emptyState('ยังไม่มีคอร์สที่ติดตามได้'); }
  render(h);
}

/* ---------- แท็บ: ตั้งค่า ---------- */
function renderSettingsTab(){
  const name = (PROFILE && PROFILE.displayName) || '-';
  const h = '<div class="set-card"><div class="set-row">'
      + '<span class="set-av">'+initials(name)+'</span>'
      + '<div><div class="set-nm">'+esc(name)+'</div><div class="set-sub">เชื่อมต่อผ่านบัญชี LINE</div></div>'
      + '</div>'
      + '<a class="btn btn-primary" style="text-decoration:none" href="enroll.html">สมัครคอร์สเพิ่มเติม</a>'
    + '</div>'
    + '<div class="set-card"><div class="section-title">บัญชีและความเป็นส่วนตัว</div>'
      + '<p class="set-sub" style="margin:0 0 14px">ยกเลิกการเชื่อมต่อจะทำให้ไม่ได้รับการแจ้งเตือนผ่าน LINE และไม่เห็นข้อมูลคอร์สในหน้านี้อีก จนกว่าจะเชื่อมต่อใหม่</p>'
      + '<button class="btn btn-danger" id="btnUnlink">ยกเลิกการเชื่อมต่อบัญชี LINE</button>'
    + '</div>';
  render(h);
  document.getElementById('btnUnlink').onclick = function(){
    openConfirm('ยกเลิกการเชื่อมต่อบัญชี LINE?', 'คุณจะไม่ได้รับแจ้งเตือนและไม่เห็นข้อมูลคอร์สที่นี่อีก จนกว่าจะเชื่อมต่อใหม่', doUnlink);
  };
}
async function doUnlink(){
  const btn = document.getElementById('cfYes');
  if(btn){ btn.disabled = true; btn.textContent = 'กำลังดำเนินการ...'; }
  try{
    const res = await api('unlinkParentLiff', { line_user_id: PROFILE.userId });
    closeSheet();
    if(res.status==='success'){ toast(res.message); setTimeout(function(){ location.reload(); }, 1200); }
    else { toast(res.message || 'ไม่สำเร็จ'); }
  }catch(e){ closeSheet(); toast('เกิดข้อผิดพลาด'); }
}

/* ---------- แจ้งลา ---------- */
function openLeave(enrollId, courseId, courseName){
  const h = '<h3>แจ้งลา</h3><p class="sub">'+esc(courseName)+'</p>'
    + '<div class="field"><label>วันที่ลา</label><input type="date" class="ctl" id="lvDate" value="'+today()+'" min="'+today()+'"></div>'
    + '<div class="field"><label>เหตุผล (ไม่บังคับ)</label><input type="text" class="ctl" id="lvReason" placeholder="เช่น ไม่สบาย / ติดธุระ"></div>'
    + '<button class="btn btn-primary" id="lvSubmit">ยืนยันแจ้งลา</button>'
    + '<button class="btn btn-ghost" onclick="closeSheet()">ยกเลิก</button>';
  document.getElementById('sheet').innerHTML = h;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('lvSubmit').onclick = function(){ submitLeave(enrollId, courseId); };
}
function closeSheet(){ document.getElementById('overlay').classList.remove('show'); }
document.getElementById('overlay').addEventListener('click', function(e){ if(e.target.id==='overlay') closeSheet(); });

/* ---------- confirm dialog (ใช้ overlay เดียวกับแจ้งลา) ---------- */
function openConfirm(title, msg, onYes){
  const h = '<h3>'+esc(title)+'</h3><p class="sub">'+esc(msg)+'</p>'
    + '<button class="btn btn-danger" id="cfYes">ยืนยัน</button>'
    + '<button class="btn btn-ghost" onclick="closeSheet()">ยกเลิก</button>';
  document.getElementById('sheet').innerHTML = h;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('cfYes').onclick = onYes;
}

async function submitLeave(enrollId, courseId){
  const date = document.getElementById('lvDate').value;
  const reason = document.getElementById('lvReason').value.trim();
  if(!date){ toast('กรุณาเลือกวันที่'); return; }
  const btn = document.getElementById('lvSubmit'); btn.disabled = true; btn.textContent = 'กำลังส่ง...';
  try{
    const res = await api('submitCourseLeave', { line_user_id: PROFILE.userId, enrollment_id: enrollId, course_id: courseId, date: date, reason: reason });
    if(res.status==='success'){
      closeSheet(); toast(res.message);
      if(liff.isInClient()){ try{ await liff.sendMessages([{type:'text', text:'แจ้งลาคอร์สเรียบร้อยแล้ว วันที่ '+date}]); }catch(e){} }
      load();
    } else { toast(res.message||'ส่งไม่สำเร็จ'); btn.disabled=false; btn.textContent='ยืนยันแจ้งลา'; }
  }catch(e){ toast('เกิดข้อผิดพลาด'); btn.disabled=false; btn.textContent='ยืนยันแจ้งลา'; }
}

boot();
</script>
