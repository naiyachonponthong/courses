<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>คอร์สของบุตรหลาน — โรงเรียนพรศิริกุล</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#3b5bd6; --brand-2:#5b7ce0; --brand-50:#eef2ff;
  --ink:#171623; --soft:#6b7280; --mut:#9aa1b2; --line:#ececf4; --bg:#f5f6fc; --white:#fff;
  --green:#16a36a; --green-50:#e8f8f0; --gold:#e0a000; --gold-50:#fff6e0; --red:#e54848; --red-50:#fdeded;
  --blue:#3b6fe0; --blue-50:#eef4ff;
  --radius:20px; --radius-lg:26px; --radius-sm:14px;
  --shadow-sm:0 2px 10px rgba(30,30,70,.05);
  --shadow-md:0 10px 28px rgba(30,30,70,.08);
  --shadow-lg:0 22px 50px rgba(30,30,70,.16);
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body{ margin:0; background:var(--bg); color:var(--ink); font-family:'Prompt','Sarabun',system-ui,sans-serif; line-height:1.5; -webkit-font-smoothing:antialiased; }
.hidden{ display:none !important; }
.i{ width:1.1em; height:1.1em; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; vertical-align:-.16em; flex:none; }

.head{ background:radial-gradient(130% 140% at 88% -25%, #87a4f5, #3b5bd6 50%, #16245f); color:#fff;
  padding:26px 20px 44px; border-radius:0 0 28px 28px; position:relative; overflow:hidden; }
.head::after{ content:""; position:absolute; width:240px; height:240px; right:-70px; top:-100px;
  background:radial-gradient(circle, rgba(255,255,255,.18), transparent 70%); border-radius:50%; }
.head-row{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; position:relative; z-index:1; }
.head h1{ font-size:21px; margin:0; font-weight:800; letter-spacing:-.3px; }
.head p{ margin:5px 0 0; font-size:13.5px; opacity:.85; }
.head-badge{ flex:none; background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.28);
  padding:6px 13px; border-radius:999px; font-size:11.5px; font-weight:600; backdrop-filter:blur(4px); white-space:nowrap; }
.head-id{ display:flex; align-items:center; gap:12px; }
.head-av{ width:46px; height:46px; border-radius:14px; background:rgba(255,255,255,.18); border:1.5px solid rgba(255,255,255,.4);
  display:grid; place-items:center; font-weight:800; font-size:18px; flex:none; overflow:hidden; }
.head-av img{ width:100%; height:100%; object-fit:cover; display:block; }
.wrap{ padding:16px 16px 110px; max-width:560px; margin:-22px auto 0; position:relative; z-index:2; }

.stats-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
.stat-card{ background:#fff; border-radius:16px; padding:13px 10px; box-shadow:var(--shadow-sm); text-align:center; }
.stat-card .sv{ font-size:19px; font-weight:800; }
.stat-card .sl{ font-size:10px; color:var(--soft); margin-top:3px; font-weight:600; }
.stat-card.accent .sv{ color:var(--brand); }

.loading{ text-align:center; padding:64px 20px; color:var(--soft); }
.spin{ width:34px; height:34px; border:3px solid var(--brand-50); border-top-color:var(--brand); border-radius:50%; animation:sp .8s linear infinite; margin:0 auto 14px; }
@keyframes sp{ to{ transform:rotate(360deg); } }

.notice{ background:#fff; border:1px solid var(--line); border-radius:var(--radius-lg); padding:34px 22px; text-align:center; color:var(--soft); box-shadow:var(--shadow-md); }
.notice .ic{ width:58px; height:58px; border-radius:50%; background:var(--brand-50); color:var(--brand); display:grid; place-items:center; margin:0 auto 16px; }
.notice .ic .i{ width:27px; height:27px; }
.notice b{ color:var(--ink); display:block; margin-bottom:6px; font-size:16.5px; }
.notice .btn{ margin-top:18px; }

.kid{ background:#fff; border:1px solid rgba(30,30,70,.05); border-radius:var(--radius-lg); padding:18px; margin-bottom:16px; box-shadow:var(--shadow-md); }
.kid-top{ display:flex; align-items:center; gap:13px; margin-bottom:6px; }
.kid-av{ width:50px; height:50px; border-radius:16px; background:linear-gradient(135deg,var(--brand-2),var(--brand)); color:#fff;
  display:grid; place-items:center; font-weight:800; font-size:20px; flex:none; box-shadow:0 8px 16px rgba(59,91,214,.32); }
.kid-nm{ font-weight:700; font-size:16.5px; letter-spacing:-.1px; }
.kid-meta{ font-size:12.5px; color:var(--soft); margin-top:1px; }
.pay{ font-size:11px; font-weight:700; padding:6px 13px; border-radius:999px; margin-left:auto; display:inline-flex; align-items:center; gap:5px; white-space:nowrap; }
.pay .i{ width:12px; height:12px; }
.pay-ok{ background:var(--green-50); color:var(--green); }
.pay-wait{ background:var(--gold-50); color:var(--gold); }
.pay-no{ background:var(--red-50); color:var(--red); }

.course{ border:1px solid var(--line); border-radius:var(--radius-sm); padding:15px; margin-top:12px; background:#fdfdfe; }
.course-h{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
.course-nm{ font-weight:700; font-size:15px; letter-spacing:-.1px; }
.course-meta{ font-size:11.5px; margin-top:8px; display:flex; gap:7px; flex-wrap:wrap; }
.course-meta span{ display:inline-flex; align-items:center; gap:5px; background:var(--brand-50); color:var(--brand); padding:4px 10px; border-radius:8px; font-weight:600; }
.course-meta .i{ width:12px; height:12px; }
.btn-leave{ border:0; background:var(--brand-50); color:var(--brand); border-radius:10px; padding:7px 13px; font-size:12.5px; font-weight:700;
  cursor:pointer; white-space:nowrap; font-family:inherit; display:inline-flex; align-items:center; gap:6px; transition:transform .12s; }
.btn-leave:active{ transform:scale(.94); }

.attbar{ height:10px; border-radius:999px; overflow:hidden; display:flex; margin-top:13px; background:var(--line); }
.attbar i{ display:block; height:100%; }
.attbar-legend{ display:flex; gap:13px; margin-top:10px; flex-wrap:wrap; }
.attbar-legend span{ display:inline-flex; align-items:center; gap:5px; font-size:11px; color:var(--soft); font-weight:600; }
.attbar-legend i{ width:8px; height:8px; border-radius:50%; display:inline-block; flex:none; }
.attnote{ margin-top:9px; font-size:11.5px; color:var(--green); font-weight:600; display:flex; align-items:center; gap:5px; }
.attnote .i{ width:13px; height:13px; }
.attnote.warn{ color:var(--gold); }
.attnote.danger{ color:var(--red); }

.group-label{ font-size:12px; font-weight:700; color:var(--soft); margin:16px 0 9px; text-transform:uppercase; letter-spacing:.4px; }

.donut-card{ display:flex; gap:18px; align-items:center; margin:14px 0 4px; flex-wrap:wrap; }
.donut-wrap{ position:relative; flex:none; }
.donut-center{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.donut-center b{ font-size:21px; font-weight:800; line-height:1; }
.donut-center small{ font-size:10px; color:var(--soft); margin-top:3px; }
.cat-list{ flex:1; min-width:170px; display:flex; flex-direction:column; gap:11px; }
.cat-item .ch{ display:flex; justify-content:space-between; font-size:12.5px; font-weight:600; margin-bottom:5px; }
.cat-item .ch .pct{ font-weight:800; }
.cat-item .cbar{ height:6px; border-radius:99px; background:var(--line); overflow:hidden; }
.cat-item .cbar i{ display:block; height:100%; border-radius:99px; }
.cat-item .csub{ font-size:10.5px; color:var(--mut); margin-top:4px; }

.pick-list{ display:flex; flex-direction:column; gap:8px; margin-bottom:14px; max-height:50vh; overflow-y:auto; }
.pick-item{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:13px 15px; border:1.5px solid var(--line);
  background:#fff; border-radius:13px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; text-align:left; transition:background .12s; }
.pick-item .i{ width:15px; height:15px; color:var(--mut); flex:none; transform:rotate(-90deg); }
.pick-item:active{ background:var(--bg); }

.result{ margin-top:12px; background:linear-gradient(135deg,var(--brand-50),#f4f7ff); border:1px solid #e1e8fc; border-radius:var(--radius-sm); padding:13px 15px; }
.result .rh{ font-size:12px; color:var(--brand); font-weight:700; display:flex; align-items:center; gap:6px; margin-bottom:5px; }
.result .rv{ font-size:13.5px; }
.result .rv b{ font-size:19px; color:var(--brand); }

.recent{ margin-top:10px; }
.rec-toggle{ font-size:12.5px; color:var(--soft); cursor:pointer; display:inline-flex; align-items:center; gap:5px; user-select:none; }
.rec-list{ margin-top:9px; display:flex; flex-direction:column; gap:6px; }
.rec-item{ display:flex; justify-content:space-between; align-items:center; font-size:12.5px; padding:8px 12px; background:var(--bg); border-radius:10px; }
.rec-st{ font-weight:700; padding:3px 10px; border-radius:7px; font-size:11px; }
.rec-st.present{ background:var(--green-50); color:var(--green); } .rec-st.late{ background:var(--gold-50); color:var(--gold); } .rec-st.absent{ background:var(--red-50); color:var(--red); } .rec-st.leave{ background:var(--blue-50); color:var(--blue); }
.empty-att{ font-size:12.5px; color:var(--mut); margin-top:10px; text-align:center; padding:10px; background:var(--bg); border-radius:10px; }

/* sheet (leave form) */
.overlay{ position:fixed; inset:0; z-index:90; background:rgba(15,18,40,.55); backdrop-filter:blur(5px); display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity .25s; }
.overlay.show{ opacity:1; pointer-events:auto; }
.sheet{ background:#fff; width:100%; max-width:560px; border-radius:26px 26px 0 0; padding:22px 22px calc(22px + env(safe-area-inset-bottom)); transform:translateY(30px); transition:transform .28s cubic-bezier(.2,.8,.2,1); box-shadow:0 -20px 50px rgba(20,20,60,.18); }
.overlay.show .sheet{ transform:translateY(0); }
.sheet h3{ margin:0 0 4px; font-size:18px; font-weight:800; letter-spacing:-.2px; }
.sheet .sub{ color:var(--soft); font-size:13px; margin:0 0 18px; }
.field{ margin-bottom:15px; }
.field label{ display:block; font-size:13px; font-weight:600; margin-bottom:7px; }
.ctl{ width:100%; padding:13px 14px; border:1.5px solid var(--line); border-radius:13px; font-size:15px; font-family:inherit; transition:border-color .15s, box-shadow .15s; }
.ctl:focus{ outline:0; border-color:var(--brand); box-shadow:0 0 0 4px var(--brand-50); }
.btn{ width:100%; padding:14px; border-radius:14px; font-weight:700; font-size:15px; border:0; cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; justify-content:center; gap:8px; transition:transform .12s, box-shadow .12s; }
.btn-primary{ background:linear-gradient(135deg,var(--brand-2),var(--brand)); color:#fff; box-shadow:0 10px 22px rgba(59,91,214,.32); }
.btn-primary:active{ transform:scale(.98); }
.btn-primary:disabled{ opacity:.55; box-shadow:none; }
.btn-ghost{ background:var(--bg); color:var(--soft); margin-top:8px; }
.btn-ghost:active{ transform:scale(.98); }

.toast{ position:fixed; left:50%; bottom:96px; translate:-50% 0; background:var(--ink); color:#fff; padding:12px 22px; border-radius:999px; font-size:13.5px; z-index:120; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; box-shadow:var(--shadow-lg); }
.toast.show{ opacity:1; }

/* bottom nav */
.bottomnav{ position:fixed; left:0; right:0; bottom:0; background:rgba(255,255,255,.92); backdrop-filter:saturate(160%) blur(14px);
  border-top:1px solid var(--line); z-index:60; padding:9px 8px env(safe-area-inset-bottom); box-shadow:0 -10px 28px rgba(30,30,70,.06); }
.bottomnav-in{ max-width:560px; margin:0 auto; display:flex; align-items:flex-end; gap:2px; }
.nav-btn{ flex:1; background:none; border:0; padding:9px 2px 8px; border-radius:14px; display:flex; flex-direction:column; align-items:center; gap:4px;
  color:var(--mut); font-family:inherit; cursor:pointer; transition:background .18s, color .18s, transform .12s; }
.nav-btn .i{ width:21px; height:21px; }
.nav-btn span{ font-size:10px; font-weight:600; }
.nav-btn.on{ color:var(--brand); background:var(--brand-50); box-shadow:inset 0 0 0 1px rgba(59,91,214,.1); }
.nav-btn:active{ transform:scale(.92); }

.nav-fab-wrap{ flex:none; display:flex; flex-direction:column; align-items:center; gap:5px; margin:0 2px; padding-bottom:1px; }
.nav-fab{ width:58px; height:58px; border-radius:50%; border:4px solid #fff; cursor:pointer; padding:0;
  background:linear-gradient(140deg,var(--brand-2),var(--brand) 65%,var(--brand-dark,#1f3a8a)); color:#fff; display:grid; place-items:center;
  margin-top:-34px; box-shadow:0 14px 28px rgba(59,91,214,.4), 0 0 0 6px rgba(59,91,214,.08);
  transition:transform .15s, box-shadow .15s; animation:fabPulse 2.6s ease-out infinite; }
.nav-fab .i{ width:25px; height:25px; stroke-width:2.3; }
.nav-fab:active{ transform:scale(.9); }
.nav-fab-label{ font-size:10px; font-weight:700; color:var(--brand); }
@keyframes fabPulse{
  0%{ box-shadow:0 14px 28px rgba(59,91,214,.4), 0 0 0 6px rgba(59,91,214,.08), 0 0 0 0 rgba(59,91,214,.35); }
  70%{ box-shadow:0 14px 28px rgba(59,91,214,.4), 0 0 0 6px rgba(59,91,214,.08), 0 0 0 13px rgba(59,91,214,0); }
  100%{ box-shadow:0 14px 28px rgba(59,91,214,.4), 0 0 0 6px rgba(59,91,214,.08), 0 0 0 0 rgba(59,91,214,0); }
}

/* settings tab */
.set-card{ background:#fff; border:1px solid rgba(30,30,70,.05); border-radius:var(--radius-lg); padding:20px; margin-bottom:16px; box-shadow:var(--shadow-md); }
.set-row{ display:flex; align-items:center; gap:13px; margin-bottom:16px; }
.set-av{ width:52px; height:52px; border-radius:16px; background:linear-gradient(135deg,var(--brand-2),var(--brand)); color:#fff;
  display:grid; place-items:center; font-weight:800; font-size:21px; flex:none; box-shadow:0 8px 16px rgba(59,91,214,.32); }
.set-nm{ font-weight:700; font-size:16.5px; letter-spacing:-.1px; }
.set-sub{ font-size:12.5px; color:var(--soft); }
.section-title{ font-size:12.5px; font-weight:700; color:var(--soft); margin:0 0 10px; text-transform:uppercase; letter-spacing:.4px; }
.btn-danger{ background:var(--red-50); color:var(--red); }
.btn-danger:active{ transform:scale(.98); }

/* role choice / teacher link */
.role-intro{ background:#fff; border-radius:var(--radius-lg); box-shadow:var(--shadow-md); text-align:center; padding:26px 22px; margin-bottom:18px; }
.role-intro-ic{ width:54px; height:54px; border-radius:16px; background:linear-gradient(135deg,var(--brand-2),var(--brand)); color:#fff;
  display:grid; place-items:center; margin:0 auto 13px; box-shadow:0 8px 16px rgba(59,91,214,.3); }
.role-intro-ic .i{ width:25px; height:25px; }
.role-intro h2{ font-size:16.5px; font-weight:800; margin:0 0 4px; letter-spacing:-.2px; }
.role-intro p{ font-size:12.5px; color:var(--soft); margin:0; }
.choice-card{ background:#fff; border:1.5px solid var(--line); border-radius:var(--radius-lg); padding:19px 18px; margin-bottom:12px;
  display:flex; align-items:center; gap:15px; cursor:pointer; box-shadow:var(--shadow-sm); transition:box-shadow .15s, border-color .15s, transform .12s; }
.choice-card:active{ border-color:var(--brand); box-shadow:0 0 0 4px var(--brand-50); transform:scale(.98); }
.choice-ic{ width:50px; height:50px; border-radius:15px; display:grid; place-items:center; flex:none; }
.choice-ic .i{ width:23px; height:23px; }
.choice-ic.parent{ background:var(--green-50); color:var(--green); }
.choice-ic.teacher{ background:var(--brand-50); color:var(--brand); }
.choice-title{ font-weight:700; font-size:15px; }
.choice-sub{ font-size:12px; color:var(--soft); margin-top:2px; }
.choice-chev{ flex:none; color:var(--mut); }
.choice-chev .i{ width:14px; height:14px; transform:rotate(-90deg); }
.link-back{ display:flex; align-items:center; gap:8px; color:var(--soft); font-size:13.5px; cursor:pointer; margin-bottom:16px; font-weight:600; }
.link-back .i{ width:16px; height:16px; }

/* teacher: course list */
.tc-card{ background:#fff; border:1px solid var(--line); border-radius:var(--radius-sm); padding:15px; margin-bottom:10px;
  display:flex; align-items:center; justify-content:space-between; gap:10px; cursor:pointer; box-shadow:var(--shadow-sm); }
.tc-nm{ font-weight:700; font-size:14.5px; }
.tc-meta{ font-size:11.5px; color:var(--soft); margin-top:4px; display:flex; gap:7px; flex-wrap:wrap; }
.tc-meta span{ display:inline-flex; align-items:center; gap:4px; }
.tc-meta .i{ width:12px; height:12px; }
.tc-card .i.chev{ width:14px; height:14px; color:var(--mut); flex:none; transform:rotate(-90deg); }

/* teacher: attendance taking */
.trow{ background:#fff; border:1px solid var(--line); border-radius:13px; padding:12px 13px; margin-bottom:8px; }
.trow-nm{ font-weight:600; font-size:14px; margin-bottom:9px; }
.tseg{ display:flex; gap:6px; }
.tseg button{ flex:1; border:1.5px solid var(--line); background:#fff; border-radius:10px; padding:8px 4px; font-size:12px; font-weight:700; color:var(--soft); cursor:pointer; font-family:inherit; }
.tseg button.on.present{ background:var(--green-50); border-color:var(--green); color:var(--green); }
.tseg button.on.late{ background:var(--gold-50); border-color:var(--gold); color:var(--gold); }
.tseg button.on.absent{ background:var(--red-50); border-color:var(--red); color:var(--red); }
.tseg button.on.leave{ background:var(--blue-50); border-color:var(--blue); color:var(--blue); }
.saved-note{ font-size:11.5px; color:var(--soft); margin-bottom:10px; }
</style>
</head>
<body>

  <symbol id="ic-home" viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V10"/><path d="M9 21v-6h6v6"/></symbol>

  <symbol id="ic-check" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></symbol>
  <symbol id="ic-x" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></symbol>
  <symbol id="ic-users" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></symbol>
  <symbol id="ic-grad" viewBox="0 0 24 24"><path d="M22 10 12 5 2 10l10 5 10-5Z"/><path d="M6 12v5c0 1 3 3 6 3s6-2 6-3v-5"/></symbol>
  <symbol id="ic-arrow-left" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></symbol>

<script>
let PROFILE = null, STATE = [];
let ROLE = '', TEACHER = null, TEACHER_COURSES = [];
let TCUR = { courseId:'', date:'', records:[] };
const ST_TH = { present:'มา', late:'สาย', absent:'ขาด', leave:'ลา' };

function esc(v){ return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function initials(n){ return (n||'?').trim().charAt(0); }
function svg(id){ return '<svg class="i"><use href="#'+id+'"></use></svg>'; }
function today(){ const d=new Date(); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
function thaiDate(ymd){ if(!ymd) return ''; const p=String(ymd).split('-'); const m=['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.']; return parseInt(p[2],10)+' '+m[parseInt(p[1],10)]+' '+(parseInt(p[0],10)+543); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }
function render(h){ document.getElementById('app').innerHTML = h; }
async function api(action, data){
  const r = await fetch(GAS_API_URL, { method:'POST', body: JSON.stringify(Object.assign({action}, data||{})) });
  return r.json();
}

async function boot(){
  if(typeof GAS_API_URL==='undefined' || !GAS_API_URL || typeof LIFF_ID==='undefined' || !LIFF_ID){
    render('<div class="notice"><div class="ic">'+svg('ic-inbox')+'</div><b>ยังไม่ได้ตั้งค่า</b>กรุณาตั้ง GAS_API_URL และ LIFF_ID ใน config.js</div>'); return;
  }
  try{
    await liff.init({ liffId: LIFF_ID });
    if(!liff.isLoggedIn()){ liff.login(); return; }
    PROFILE = await liff.getProfile();
    load();
  }catch(e){ render('<div class="notice">เชื่อมต่อ LIFF ไม่สำเร็จ: '+esc(e.message||e)+'</div>'); }
}

async function load(){
  const res = await api('parentCourseInit', { line_user_id: PROFILE.userId });
  if(res.status==='success'){
    ROLE = 'parent'; STATE = res.data;
    document.getElementById('pageTitle').textContent = 'คอร์สของบุตรหลาน';
    document.getElementById('headSub').textContent = 'สวัสดีค่ะ คุณ'+(PROFILE.displayName||'');
    document.getElementById('headBadge').classList.remove('hidden');
    setHeadAvatar();
    renderActiveTab();
    renderNav();
    return;
  }
  const tRes = await api('courseTeacherLiffInit', { line_user_id: PROFILE.userId });
  if(tRes.status==='success'){
    ROLE = 'teacher'; TEACHER = tRes.user; TEACHER_COURSES = tRes.courses||[];
    document.getElementById('pageTitle').textContent = 'เช็คชื่อคอร์สเรียน';
    document.getElementById('headSub').textContent = 'สวัสดีคุณครู '+(TEACHER.name||'');
    document.getElementById('headBadge').classList.remove('hidden');
    setHeadAvatar();
    TAB = 'thome';
    renderActiveTab();
    renderNav();
    return;
  }
  renderChoicePage();
}

/* ---------- หน้าเลือกบทบาท (ครั้งแรกที่ยังไม่เชื่อมบัญชี) ---------- */
function renderChoicePage(){
  document.getElementById('pageTitle').textContent = 'ระบบคอร์สเรียน';
  document.getElementById('headSub').textContent = 'เชื่อมต่อบัญชี LINE';

  document.getElementById('headAv').classList.add('hidden');
  render('<div class="role-intro">'
      + '<div class="role-intro-ic">'+svg('ic-user-check')+'</div>'
      + '<h2>เลือกบทบาทของคุณ</h2>'
      + '<p>เพื่อแสดงเมนูที่เหมาะกับท่าน</p>'
    + '</div>'
    + '<div class="choice-card" onclick="renderParentChoice()">'
      + '<div class="choice-ic parent">'+svg('ic-users')+'</div>'
      + '<div style="flex:1"><div class="choice-title">ผู้ปกครอง</div><div class="choice-sub">ติดตามการมาเรียน / ผลการเรียน / แจ้งลา</div></div>'
      + '<span class="choice-chev">'+svg('ic-chev')+'</span>'
    + '</div>'
    + '<div class="choice-card" onclick="renderTeacherLinkForm()">'
      + '<div class="choice-ic teacher">'+svg('ic-grad')+'</div>'
      + '<div style="flex:1"><div class="choice-title">ครู / บุคลากร</div><div class="choice-sub">เช็คชื่อนักเรียนในคอร์สที่สอน</div></div>'
      + '<span class="choice-chev">'+svg('ic-chev')+'</span>'
    + '</div>');
}
function renderParentChoice(){
  render('<div class="link-back" onclick="renderChoicePage()">'+svg('ic-arrow-left')+'ย้อนกลับ</div>'
    + '<div class="notice"><div class="ic">'+svg('ic-inbox')+'</div><b>ยังไม่พบใบสมัครคอร์ส</b>'
    + 'เมื่อสมัครคอร์สผ่านบัญชี LINE นี้ ข้อมูลการมาเรียนและผลการเรียนจะแสดงที่นี่'
    + '<a class="btn btn-primary" style="text-decoration:none;margin-top:16px" href="enroll.html">สมัครคอร์สเรียน</a></div>');
}
function renderTeacherLinkForm(){
  render('<div class="link-back" onclick="renderChoicePage()">'+svg('ic-arrow-left')+'ย้อนกลับ</div>'
    + '<div class="kid">'
    + '<div style="font-weight:700;font-size:15px;margin-bottom:4px">เชื่อมบัญชีครู</div>'
    + '<div style="font-size:12.5px;color:var(--soft);margin-bottom:16px">กรอก Username ที่ได้รับจากผู้ดูแลระบบ (บัญชีเดียวกับที่ใช้ล็อกอินหลังบ้าน)</div>'
    + '<div class="field"><label>Username</label><input class="ctl" id="tcUser" placeholder="เช่น teacher01" autocomplete="off"></div>'
    + '<button class="btn btn-primary" id="btnTLink">'+svg('ic-user-check')+' เชื่อมต่อ</button>'
    + '</div>');

}
async function doTeacherLink(){
  const code = document.getElementById('tcUser').value.trim();
  if(!code){ toast('กรุณากรอก Username'); return; }
  const btn = document.getElementById('btnTLink'); btn.disabled = true; btn.textContent = 'กำลังเชื่อมต่อ...';
  try{
    const res = await api('linkTeacherLine', { line_user_id: PROFILE.userId, teacher_code: code });
    if(res.status==='success'){ toast('เชื่อมต่อสำเร็จ'); load(); }
    else { toast(res.message||'ไม่สำเร็จ'); btn.disabled=false; btn.innerHTML=svg('ic-user-check')+' เชื่อมต่อ'; }
  }catch(e){ toast('เกิดข้อผิดพลาด'); btn.disabled=false; btn.innerHTML=svg('ic-user-check')+' เชื่อมต่อ'; }

function setHeadAvatar(){

const NAV_ITEMS = [
  { id:'home', label:'หน้าหลัก', icon:'ic-home' },

      h += '<button class="nav-btn'+(TAB===n.id?' on':'')+'" onclick="setTab(\''+n.id+'\')">'+svg(n.icon)+'<span>'+n.label+'</span></button>';

function setTab(t){ TAB = t; renderActiveTab(); renderNav(); window.scrollTo(0,0); }
function renderActiveTab(){

    if(TAB==='tsettings') renderTeacherSettingsTab();
    else renderTeacherHome();

  }
  if(TAB==='attendance') renderAttendanceTab();
  else if(TAB==='results') renderResultsTab();

  else renderHome();

const PAY = { approved:['pay-ok','อนุมัติแล้ว','ic-check'], pending_review:['pay-wait','รอตรวจสอบ','ic-clock'], rejected:['pay-no','ไม่อนุมัติ','ic-x'] };
const STATUS_COLOR = { present:'#16a36a', late:'#e0a000', absent:'#e54848', leave:'#3b6fe0' };

/* ---------- การ์ดสรุปด้านบน (รวมทุกบุตรหลาน) ---------- */
function statsRow(){
  let totalCourses=0, pendingKids=0, sumPresent=0, sumLate=0, sumTotal=0;
  STATE.forEach(function(kid){
    totalCourses += kid.courses.length;
    if(kid.payment_status==='pending_review') pendingKids++;
    kid.courses.forEach(function(c){
      const s=c.summary||{};
      sumPresent += (s.present||0); sumLate += (s.late||0); sumTotal += (s.total||0);
    });
  });
  const rate = sumTotal ? Math.round((sumPresent+sumLate)/sumTotal*100) : null;
  return '<div class="stats-row">'
    + '<div class="stat-card"><div class="sv">'+totalCourses+'</div><div class="sl">คอร์สทั้งหมด</div></div>'
    + '<div class="stat-card accent"><div class="sv">'+(rate!=null?rate+'%':'-')+'</div><div class="sl">อัตรามาเรียน</div></div>'
    + '<div class="stat-card"><div class="sv">'+pendingKids+'</div><div class="sl">รอตรวจสอบ</div></div>'
    + '</div>';
}

/* ---------- แถบสรุปการมาเรียนแบบ segmented bar ---------- */
function attBarHtml(s){
  const total = s.total||0;
  if(!total) return '<div class="empty-att">ยังไม่มีบันทึกการมาเรียน</div>';
  const pct = function(n){ return total ? (n/total*100) : 0; };
  let bar = '<div class="attbar">';
  ['present','late','absent','leave'].forEach(function(k){
    if(s[k]) bar += '<i style="width:'+pct(s[k])+'%;background:'+STATUS_COLOR[k]+'"></i>';
  });
  bar += '</div>';
  const legend = '<div class="attbar-legend">'
    + ['present','late','absent','leave'].map(function(k){
        return '<span><i style="background:'+STATUS_COLOR[k]+'"></i>'+ST_TH[k]+' '+(s[k]||0)+'</span>';
      }).join('')
    + '</div>';
  const rate = Math.round(pct((s.present||0)+(s.late||0)));
  let note, cls;
  if(rate>=90){ note='เข้าเรียนสม่ำเสมอ'; cls=''; }
  else if(rate>=75){ note='ควรติดตามเล็กน้อย'; cls='warn'; }
  else { note='ควรติดตามใกล้ชิด'; cls='danger'; }
  return bar + legend + '<div class="attnote '+cls+'">'+svg('ic-check')+note+' ('+rate+'%)</div>';
}

function renderHome(){
  let h = STATE.length ? statsRow() : '';
  STATE.forEach(function(kid){
    const pay = PAY[kid.payment_status] || PAY.pending_review;
    h += '<div class="kid"><div class="kid-top">'
      + '<span class="kid-av">'+initials(kid.student_name)+'</span>'
      + '<div><div class="kid-nm">'+esc(kid.student_name)+'</div>'
      + '<div class="kid-meta">'+esc(kid.level||'-')+' · '+esc(kid.room||'-')+' · เลขที่ '+esc(kid.ref||'-')+'</div></div>'
      + '<span class="pay '+pay[0]+'">'+svg(pay[2])+pay[1]+'</span></div>';

    if(!kid.courses.length){ h += '<div class="empty-att">ยังไม่มีคอร์ส</div>'; }
    kid.courses.forEach(function(c){
      const s = c.summary || {};
      const tm = (c.time_start||'') + (c.time_end?('–'+c.time_end):'');
      h += '<div class="course"><div class="course-h"><div>'
        + '<div class="course-nm">'+esc(c.name)+'</div>'
        + '<div class="course-meta">'
          + (c.days?'<span>'+svg('ic-calendar')+esc(c.days)+'</span>':'')
          + (tm?'<span>'+svg('ic-clock')+esc(tm)+' น.</span>':'')
        + '</div></div>'
        + '<button class="btn-leave" onclick="openLeave(\''+kid.enrollment_id+'\',\''+c.course_id+'\',\''+esc(c.name)+'\')">'+svg('ic-cal-x')+'แจ้งลา</button>'
        + '</div>'
        + attBarHtml(s)
        + '</div>';
    });
    h += '</div>';
  });
  if(!h){ h = emptyState('ยังไม่มีคอร์สที่ติดตามได้'); }
  render(h);
}

/* ---------- โดนัทชาร์ตการมาเรียน ---------- */
function donutChart(s, size, sw){
  size = size || 110; sw = sw || 14;
  const r=(size-sw)/2, c=size/2, circ=2*Math.PI*r;
  const total = s.total||0;
  let off=0, circles='';
  ['present','late','absent','leave'].forEach(function(k){
    const v = s[k]||0; if(!v || !total) return;
    const frac=v/total, dash=frac*circ, gap=circ-dash;
    circles += '<circle cx="'+c+'" cy="'+c+'" r="'+r+'" fill="none" stroke="'+STATUS_COLOR[k]+'" stroke-width="'+sw+'" '
      + 'stroke-dasharray="'+dash.toFixed(2)+' '+gap.toFixed(2)+'" stroke-dashoffset="'+(-off).toFixed(2)+'" '
      + 'stroke-linecap="round" transform="rotate(-90 '+c+' '+c+')"></circle>';
    off += dash;
  });
  return '<svg viewBox="0 0 '+size+' '+size+'" width="'+size+'" height="'+size+'">'
    + '<circle cx="'+c+'" cy="'+c+'" r="'+r+'" fill="none" stroke="#eef0f7" stroke-width="'+sw+'"></circle>'
    + circles + '</svg>';
}
function catList(s){
  const total = s.total||0;
  let h='';
  ['present','late','absent','leave'].forEach(function(k){
    const v = s[k]||0;
    const pct = total ? Math.round(v/total*100) : 0;
    h += '<div class="cat-item"><div class="ch"><span>'+ST_TH[k]+'</span><span class="pct">'+pct+'%</span></div>'
       + '<div class="cbar"><i style="width:'+pct+'%;background:'+STATUS_COLOR[k]+'"></i></div>'
       + '<div class="csub">'+v+' ครั้ง จาก '+total+' ครั้ง</div></div>';
  });
  return h;
}

/* ---------- แท็บ: การมาเรียน ---------- */
function renderAttendanceTab(){
  let h = '';
  STATE.forEach(function(kid){
    kid.courses.forEach(function(c){
      const s = c.summary || {};
      h += '<div class="kid"><div class="kid-top">'
        + '<span class="kid-av">'+initials(kid.student_name)+'</span>'
        + '<div><div class="kid-nm">'+esc(kid.student_name)+'</div>'
        + '<div class="kid-meta">'+esc(c.name)+'</div></div></div>';
      if(s.total){
        h += '<div class="donut-card">'
          + '<div class="donut-wrap">'+donutChart(s)+'<div class="donut-center"><b>'+s.total+'</b><small>ครั้งเรียน</small></div></div>'
          + '<div class="cat-list">'+catList(s)+'</div>'
          + '</div>';
        h += '<div class="group-label">ประวัติการเช็คชื่อ</div>';
        h += '<div class="rec-list">';
        (c.records||[]).forEach(function(r){
          h += '<div class="rec-item"><span>'+thaiDate(r.date)+(r.note?' · '+esc(r.note):'')+'</span>'
            + '<span class="rec-st '+r.status+'">'+esc(r.status_th)+'</span></div>';
        });
        h += '</div>';
      } else {
        h += '<div class="empty-att">ยังไม่มีบันทึกการมาเรียน</div>';
      }
      h += '</div>';
    });
  });
  if(!h){ h = emptyState('ยังไม่มีคอร์สที่ติดตามได้'); }
  render(h);
}

/* ---------- แท็บ: ผลการเรียน ---------- */
function renderResultsTab(){
  let h = '';

    kid.courses.forEach(function(c){
      h += '<div class="kid"><div class="kid-top">'

          + (c.result.grade?' · เกรด <b>'+esc(c.result.grade)+'</b>':'')

          + '</div></div>';
      } else {
        h += '<div class="empty-att">ยังไม่มีผลการเรียน</div>';
      }
      h += '</div>';
    });
  });
  if(!h){ h = emptyState('ยังไม่มีคอร์สที่ติดตามได้'); }
  render(h);

/* ---------- แท็บ: ตั้งค่า ---------- */

/* ---------- ปุ่มลอย: แจ้งลาด่วน (เลือกคอร์สก่อนถ้ามีมากกว่า 1) ---------- */
function quickLeave(){
  const opts = [];
  STATE.forEach(function(kid){
    kid.courses.forEach(function(c){
      opts.push({ enrollId: kid.enrollment_id, courseId: c.course_id, label: kid.student_name+' · '+c.name });
    });
  });
  if(!opts.length){ toast('ยังไม่มีคอร์สให้แจ้งลา'); return; }
  if(opts.length===1){ openLeave(opts[0].enrollId, opts[0].courseId, opts[0].label); return; }

  let h = '<h3>แจ้งลา</h3><p class="sub">เลือกคอร์สที่ต้องการแจ้งลา</p><div class="pick-list">';
  opts.forEach(function(o){
    h += '<button class="pick-item" onclick="closeSheet();openLeave(\''+o.enrollId+'\',\''+o.courseId+'\',\''+esc(o.label)+'\')">'
      + esc(o.label) + svg('ic-chev') + '</button>';
  });
  h += '</div><button class="btn btn-ghost" onclick="closeSheet()">ยกเลิก</button>';
  document.getElementById('sheet').innerHTML = h;
  document.getElementById('overlay').classList.add('show');
}

/* ---------- แจ้งลา ---------- */
function openLeave(enrollId, courseId, courseName){
  const h = '<h3>แจ้งลา</h3><p class="sub">'+esc(courseName)+'</p>'
    + '<div class="field"><label>วันที่ลา</label><input type="date" class="ctl" id="lvDate" value="'+today()+'" min="'+today()+'"></div>'
    + '<div class="field"><label>เหตุผล (ไม่บังคับ)</label><input type="text" class="ctl" id="lvReason" placeholder="เช่น ไม่สบาย / ติดธุระ"></div>'
    + '<button class="btn btn-primary" id="lvSubmit">ยืนยันแจ้งลา</button>'
    + '<button class="btn btn-ghost" onclick="closeSheet()">ยกเลิก</button>';
  document.getElementById('sheet').innerHTML = h;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('lvSubmit').onclick = function(){ submitLeave(enrollId, courseId); };
}
function closeSheet(){ document.getElementById('overlay').classList.remove('show'); }
document.getElementById('overlay').addEventListener('click', function(e){ if(e.target.id==='overlay') closeSheet(); });

/* ---------- confirm dialog (ใช้ overlay เดียวกับแจ้งลา) ---------- */
function openConfirm(title, msg, onYes){
  const h = '<h3>'+esc(title)+'</h3><p class="sub">'+esc(msg)+'</p>'
    + '<button class="btn btn-danger" id="cfYes">ยืนยัน</button>'
    + '<button class="btn btn-ghost" onclick="closeSheet()">ยกเลิก</button>';
  document.getElementById('sheet').innerHTML = h;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('cfYes').onclick = onYes;
}

async function submitLeave(enrollId, courseId){
  const date = document.getElementById('lvDate').value;
  const reason = document.getElementById('lvReason').value.trim();
  if(!date){ toast('กรุณาเลือกวันที่'); return; }
  const btn = document.getElementById('lvSubmit'); btn.disabled = true; btn.textContent = 'กำลังส่ง...';
  try{
    const res = await api('submitCourseLeave', { line_user_id: PROFILE.userId, enrollment_id: enrollId, course_id: courseId, date: date, reason: reason });
    if(res.status==='success'){
      closeSheet(); toast(res.message);
      if(liff.isInClient()){ try{ await liff.sendMessages([{type:'text', text:'แจ้งลาคอร์สเรียบร้อยแล้ว วันที่ '+date}]); }catch(e){} }
      load();
    } else { toast(res.message||'ส่งไม่สำเร็จ'); btn.disabled=false; btn.textContent='ยืนยันแจ้งลา'; }
  }catch(e){ toast('เกิดข้อผิดพลาด'); btn.disabled=false; btn.textContent='ยืนยันแจ้งลา'; }
}

/* ══════════════════════════════════════════════════
   ครู — เช็คชื่อคอร์สผ่าน LINE
   ══════════════════════════════════════════════════ */
function renderTeacherHome(){
  if(!TEACHER_COURSES.length){
    render(emptyState('ยังไม่มีคอร์สที่คุณครูเช็คชื่อได้'));
    return;
  }
  let h = '<div class="group-label">คอร์สที่เช็คชื่อได้</div>';
  TEACHER_COURSES.forEach(function(c){
    const tm = (c.time_start||'') + (c.time_end?('–'+c.time_end):'');
    h += '<div class="tc-card" onclick="openTeacherCourse(\''+c.id+'\')">'
      + '<div><div class="tc-nm">'+esc(c.name)+'</div>'
      + '<div class="tc-meta">'
        + (c.days?'<span>'+svg('ic-calendar')+esc(c.days)+'</span>':'')
        + (tm?'<span>'+svg('ic-clock')+esc(tm)+' น.</span>':'')
      + '</div></div>'
      + svg('ic-chev').replace('class="i"','class="i chev"')
      + '</div>';
  });
  render(h);
}

async function openTeacherCourse(courseId){
  TCUR.courseId = courseId; TCUR.date = TCUR.date || today();
  render('<div class="loading"><div class="spin"></div>กำลังโหลดรายชื่อ...</div>');
  await fetchTeacherAttendance();
}

async function fetchTeacherAttendance(){
  const res = await api('getCourseAttendanceLiff', { line_user_id: PROFILE.userId, course_id: TCUR.courseId, date: TCUR.date });
  if(res.status!=='success'){ render('<div class="notice">'+esc(res.message||'เกิดข้อผิดพลาด')+'</div>'); return; }
  TCUR.records = res.records;
  renderTeacherAttendance(res);
}

function renderTeacherAttendance(res){
  let h = '<div class="link-back" onclick="TCUR.courseId=\'\';renderTeacherHome()">'+svg('ic-arrow-left')+'รายชื่อคอร์ส</div>';
  h += '<div class="kid" style="margin-bottom:12px">'
    + '<div style="font-weight:700;font-size:15.5px;margin-bottom:10px">'+esc(res.course_name)+'</div>'
    + '<div class="field" style="margin-bottom:0"><label>วันที่เช็คชื่อ</label><input type="date" class="ctl" id="tDate" value="'+TCUR.date+'"></div>'
    + '</div>';
  if(res.saved) h += '<div class="saved-note">'+svg('ic-check')+' บันทึกแล้ว โดย '+esc(res.saved_by||'')+' (แก้ไขแล้วบันทึกซ้ำได้)</div>';
  if(!res.records.length){
    h += emptyState('ยังไม่มีนักเรียนที่อนุมัติในคอร์สนี้');
  } else {
    res.records.forEach(function(r, i){
      h += '<div class="trow"><div class="trow-nm">'+(i+1)+'. '+esc(r.student_name)+'</div>'
        + '<div class="tseg" data-eid="'+r.enrollment_id+'">'
        + ['present','late','absent','leave'].map(function(st){
            return '<button data-st="'+st+'" class="'+(r.status===st?'on '+st:'')+'" onclick="setTeacherSt(this,\''+r.enrollment_id+'\',\''+st+'\')">'+ST_TH[st]+'</button>';
          }).join('')
        + '</div></div>';
    });
    h += '<button class="btn btn-primary" id="btnSaveTAtt" style="margin-top:6px">'+svg('ic-check')+' บันทึกเช็คชื่อ</button>';
  }
  render(h);
  const dEl = document.getElementById('tDate');
  if(dEl) dEl.onchange = function(){ TCUR.date = this.value; fetchTeacherAttendance(); };
  const saveBtn = document.getElementById('btnSaveTAtt');
  if(saveBtn) saveBtn.onclick = saveTeacherAttendance;
}

function setTeacherSt(btn, enrollId, st){
  const seg = btn.closest('.tseg');
  seg.querySelectorAll('button').forEach(function(b){ b.className = ''; });
  btn.className = 'on '+st;
  const r = TCUR.records.find(function(x){ return x.enrollment_id===enrollId; });
  if(r) r.status = st;
}

async function saveTeacherAttendance(){
  const btn = document.getElementById('btnSaveTAtt'); btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
  const payload = { course_id: TCUR.courseId, date: TCUR.date,
    records: TCUR.records.map(function(r){ return { enrollment_id:r.enrollment_id, student_name:r.student_name, status:r.status, note:'' }; }) };
  try{
    const res = await api('saveCourseAttendanceLiff', { line_user_id: PROFILE.userId, payload: payload });
    if(res.status==='success'){ toast(res.message); fetchTeacherAttendance(); }
    else { toast(res.message||'บันทึกไม่สำเร็จ'); btn.disabled=false; btn.innerHTML=svg('ic-check')+' บันทึกเช็คชื่อ'; }
  }catch(e){ toast('เกิดข้อผิดพลาด'); btn.disabled=false; btn.innerHTML=svg('ic-check')+' บันทึกเช็คชื่อ'; }
}

function renderTeacherSettingsTab(){
  const name = (TEACHER && TEACHER.name) || '-';
  render('<div class="set-card"><div class="set-row">'
      + '<span class="set-av">'+initials(name)+'</span>'
      + '<div><div class="set-nm">'+esc(name)+'</div><div class="set-sub">เชื่อมต่อผ่านบัญชี LINE (ครู)</div></div>'
      + '</div></div>'
    + '<div class="set-card"><div class="section-title">บัญชีและความเป็นส่วนตัว</div>'
      + '<p class="set-sub" style="margin:0 0 14px">ยกเลิกการเชื่อมต่อจะทำให้ไม่เห็นเมนูเช็คชื่อที่นี่อีก จนกว่าจะเชื่อมต่อใหม่</p>'
      + '<button class="btn btn-danger" id="btnUnlinkT">ยกเลิกการเชื่อมต่อบัญชี LINE</button>'
    + '</div>');
  document.getElementById('btnUnlinkT').onclick = function(){
    openConfirm('ยกเลิกการเชื่อมต่อบัญชี LINE?', 'คุณจะไม่เห็นเมนูเช็คชื่อที่นี่อีก จนกว่าจะเชื่อมต่อใหม่', doUnlinkTeacher);
  };
}
async function doUnlinkTeacher(){
  const btn = document.getElementById('cfYes');
  if(btn){ btn.disabled = true; btn.textContent = 'กำลังดำเนินการ...'; }
  try{
    const res = await api('unlinkLiff', { line_user_id: PROFILE.userId });
    closeSheet();
    if(res.status==='success'){ toast(res.message); setTimeout(function(){ location.reload(); }, 1200); }
    else { toast(res.message || 'ไม่สำเร็จ'); }
  }catch(e){ closeSheet(); toast('เกิดข้อผิดพลาด'); }
}

boot();
</script>
